<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="جدول الإعلام">
<title>جدول الكلمات القادمة</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --card-hover: #1e2d50;
    --accent: #e2a84b;
    --accent-soft: rgba(226,168,75,0.12);
    --green: #4caf7d;
    --green-soft: rgba(76,175,125,0.12);
    --red: #e05c5c;
    --red-soft: rgba(224,92,92,0.12);
    --text: #eef0f5;
    --text-muted: #8892a4;
    --border: rgba(255,255,255,0.06);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--accent), #c8872a);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .logo-text p {
    font-size: 11px;
    color: var(--text-muted);
  }

  .refresh-btn {
    width: 36px;
    height: 36px;
    background: var(--accent-soft);
    border: 1px solid rgba(226,168,75,0.2);
    border-radius: 10px;
    color: var(--accent);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .refresh-btn:active { transform: scale(0.9); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 8px;
  }

  .stat-chip {
    flex: 1;
    background: var(--accent-soft);
    border: 1px solid rgba(226,168,75,0.15);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
  }

  .stat-chip .num {
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .stat-chip .lbl {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .stat-chip.green { background: var(--green-soft); border-color: rgba(76,175,125,0.15); }
  .stat-chip.green .num { color: var(--green); }

  .stat-chip.red { background: var(--red-soft); border-color: rgba(224,92,92,0.15); }
  .stat-chip.red .num { color: var(--red); }

  /* Search & Filter */
  .controls {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
  }

  .search-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: rgba(226,168,75,0.4); }
  .search-box::placeholder { color: var(--text-muted); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text-muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent-soft);
    border-color: rgba(226,168,75,0.3);
    color: var(--accent);
  }

  /* Cards */
  .cards-container {
    padding: 4px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
  }

  .card:active { transform: scale(0.98); }

  .card.urgent { border-color: rgba(224,92,92,0.3); }
  .card.soon { border-color: rgba(226,168,75,0.25); }
  .card.ready { border-color: rgba(76,175,125,0.25); }

  .card-header {
    padding: 14px 14px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .days-badge {
    min-width: 52px;
    height: 52px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--accent-soft);
  }

  .days-badge .days-num {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .days-badge .days-lbl {
    font-size: 9px;
    color: var(--accent);
    opacity: 0.8;
  }

  .days-badge.urgent { background: var(--red-soft); }
  .days-badge.urgent .days-num, .days-badge.urgent .days-lbl { color: var(--red); }

  .days-badge.today { background: var(--red-soft); }
  .days-badge.today .days-num { font-size: 13px; }
  .days-badge.today .days-num, .days-badge.today .days-lbl { color: var(--red); }

  .days-badge.soon { background: var(--accent-soft); }

  .days-badge.comfortable { background: var(--green-soft); }
  .days-badge.comfortable .days-num, .days-badge.comfortable .days-lbl { color: var(--green); }

  .card-info { flex: 1; min-width: 0; }

  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .meta-tag {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
    background: rgba(255,255,255,0.04);
    padding: 3px 8px;
    border-radius: 6px;
  }

  .meta-tag .icon { font-size: 10px; }

  /* Design image */
  .design-section {
    border-top: 1px solid var(--border);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }

  .design-section.open { max-height: 400px; }

  .design-img {
    width: 100%;
    display: block;
    object-fit: cover;
    max-height: 300px;
  }

  .design-placeholder {
    padding: 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }

  .no-design-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.03);
    color: var(--text-muted);
  }

  /* Bottom details strip */
  .card-footer {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .date-display {
    font-size: 12px;
    color: var(--text-muted);
  }

  .designer-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 500;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p { color: var(--text-muted); font-size: 14px; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Error */
  .error-box {
    margin: 20px 16px;
    background: var(--red-soft);
    border: 1px solid rgba(224,92,92,0.2);
    border-radius: var(--radius);
    padding: 16px;
    font-size: 13px;
    color: var(--red);
    line-height: 1.6;
  }

  /* Expand arrow */
  .expand-arrow {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
    padding: 4px 14px 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .expand-arrow.open { transform: rotate(180deg); }

  /* Section label */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 16px 16px 6px;
  }

  /* Scroll to top */
  .fab {
    position: fixed;
    bottom: 24px;
    left: 16px;
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(226,168,75,0.4);
    color: #1a1a2e;
    font-weight: bold;
    transition: transform 0.2s;
    border: none;
  }

  .fab:active { transform: scale(0.9); }

  /* Design link btn */
  .design-link-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-soft);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    text-decoration: none;
  }

  .toggle-design-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    padding: 0 14px 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .toggle-design-btn .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .toggle-design-btn .dot.no { background: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🎙️</div>
      <div class="logo-text">
        <h1>الكلمات القادمة</h1>
        <p id="last-update">جمعية الراكة الدعوية</p>
      </div>
    </div>
    <button class="refresh-btn" onclick="loadData()" title="تحديث">↻</button>
  </div>
  <div class="stats-bar">
    <div class="stat-chip" id="stat-total">
      <div class="num">—</div>
      <div class="lbl">كلمة قادمة</div>
    </div>
    <div class="stat-chip red" id="stat-urgent">
      <div class="num">—</div>
      <div class="lbl">خلال 3 أيام</div>
    </div>
    <div class="stat-chip green" id="stat-designed">
      <div class="num">—</div>
      <div class="lbl">جاهز التصميم</div>
    </div>
  </div>
</div>

<div class="controls">
  <input class="search-box" type="text" placeholder="🔍  بحث بالعنوان أو الشيخ..." id="search-input" oninput="renderCards()">
  <button class="filter-btn" id="filter-btn" onclick="toggleFilter()">بدون تصميم</button>
</div>

<div id="main-content">
  <div class="loading">
    <div class="spinner"></div>
    <p>جارٍ تحميل البيانات...</p>
  </div>
</div>

<button class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const SHEET_ID = '1dmh2EZ0BoFR-352eK4tqEezqzyRKIi_9bOMDmZogk6w';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;

let allRows = [];
let showOnlyNoDesign = false;

async function loadData() {
  document.getElementById('main-content').innerHTML = `
    <div class="loading"><div class="spinner"></div><p>جارٍ تحميل البيانات...</p></div>`;
  
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    
    const rows = json.table.rows;
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    allRows = [];

    for (let r of rows) {
      const cells = r.c;
      if (!cells || !cells[6]) continue; // no date

      // Columns: B=0(النوع), C=1(رقم القسم), D=2(العنوان), E=3(الشيخ),
      // F=4(اليوم), G=5(ميلادي), H=6(هجري), I=7(التوقيت), J=8(الموقع),
      // K=9(كم يوم), L=10(المصمم), M=11(ملاحظات), N=12(الأرشفة), O=13(رابط التصميم)
      
      const getVal = (i) => cells[i] && cells[i].v != null ? String(cells[i].v).trim() : '';
      const getFormatted = (i) => cells[i] && cells[i].f != null ? String(cells[i].f).trim() : getVal(i);

      // Parse the date
      let eventDate = null;
      if (cells[5] && cells[5].v) {
        // Google Sheets date comes as "Date(year,month,day)" or formatted string
        const dateVal = cells[5].v;
        if (typeof dateVal === 'string' && dateVal.startsWith('Date(')) {
          const parts = dateVal.replace('Date(', '').replace(')', '').split(',');
          eventDate = new Date(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
        } else if (cells[5].f) {
          // Try parsing formatted date string like "15/11"
          const formatted = cells[5].f;
          const match = formatted.match(/(\d+)\/(\d+)/);
          if (match) {
            const day = parseInt(match[1]);
            const month = parseInt(match[2]);
            const year = today.getFullYear();
            eventDate = new Date(year, month - 1, day);
            if (eventDate < today) eventDate.setFullYear(year + 1);
          }
        }
      }

      if (!eventDate) continue;
      eventDate.setHours(0, 0, 0, 0);

      const diffMs = eventDate - today;
      const daysLeft = Math.round(diffMs / (1000 * 60 * 60 * 24));

      if (daysLeft < 0) continue; // past events

      const designLink = getVal(13);
      const archiveStatus = getVal(12);
      const hasDesign = designLink.length > 0 || archiveStatus === 'تمت الأرشفة' || archiveStatus.includes('✅');

      // Convert Google Drive link to direct image
      let directImgUrl = null;
      if (designLink && designLink.includes('drive.google.com')) {
        const idMatch = designLink.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (idMatch) {
          directImgUrl = `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w600`;
        }
      }

      allRows.push({
        type: getVal(0),
        num: getVal(1),
        title: getVal(2),
        sheikh: getVal(3),
        day: getVal(4),
        dateDisplay: getFormatted(5) || getVal(5),
        dateHijri: getVal(6),
        time: getVal(7),
        location: getVal(8),
        designer: getVal(10),
        notes: getVal(11),
        designLink,
        directImgUrl,
        hasDesign,
        eventDate,
        daysLeft,
      });
    }

    allRows.sort((a, b) => a.daysLeft - b.daysLeft);

    updateStats();
    renderCards();

    const now = new Date();
    document.getElementById('last-update').textContent =
      `آخر تحديث: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  } catch (e) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-box">
        ⚠️ تعذّر تحميل البيانات.<br><br>
        تأكد من أن الجدول مشارك للعموم، ثم اضغط زر التحديث ↻<br><br>
        <small style="opacity:0.7">${e.message}</small>
      </div>`;
  }
}

function updateStats() {
  const total = allRows.length;
  const urgent = allRows.filter(r => r.daysLeft <= 3).length;
  const designed = allRows.filter(r => r.hasDesign).length;

  document.querySelector('#stat-total .num').textContent = total;
  document.querySelector('#stat-urgent .num').textContent = urgent;
  document.querySelector('#stat-designed .num').textContent = designed;
}

function toggleFilter() {
  showOnlyNoDesign = !showOnlyNoDesign;
  const btn = document.getElementById('filter-btn');
  btn.classList.toggle('active', showOnlyNoDesign);
  btn.textContent = showOnlyNoDesign ? '✓ بدون تصميم' : 'بدون تصميم';
  renderCards();
}

function getDayClass(days) {
  if (days === 0) return 'today';
  if (days <= 2) return 'urgent';
  if (days <= 7) return 'soon';
  return 'comfortable';
}

function getCardClass(days) {
  if (days <= 2) return 'urgent';
  if (days <= 7) return 'soon';
  return 'ready';
}

function renderCards() {
  const search = document.getElementById('search-input').value.trim().toLowerCase();

  let filtered = allRows.filter(r => {
    const matchSearch = !search ||
      r.title.toLowerCase().includes(search) ||
      r.sheikh.toLowerCase().includes(search) ||
      r.location.toLowerCase().includes(search);
    const matchFilter = !showOnlyNoDesign || !r.hasDesign;
    return matchSearch && matchFilter;
  });

  if (filtered.length === 0) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty">
        <div class="emoji">🔍</div>
        <p>لا توجد نتائج</p>
      </div>`;
    return;
  }

  let html = '';
  let lastSection = null;

  for (let i = 0; i < filtered.length; i++) {
    const r = filtered[i];
    const dayClass = getDayClass(r.daysLeft);
    const cardClass = getCardClass(r.daysLeft);

    // Section labels
    let section = null;
    if (r.daysLeft === 0) section = '🔴 اليوم';
    else if (r.daysLeft <= 3) section = '🟠 خلال 3 أيام';
    else if (r.daysLeft <= 7) section = '🟡 هذا الأسبوع';
    else if (r.daysLeft <= 14) section = '🟢 خلال أسبوعين';
    else section = '📅 لاحقاً';

    if (section !== lastSection) {
      html += `<div class="section-label">${section}</div>`;
      lastSection = section;
    }

    const daysText = r.daysLeft === 0 ? 'اليوم' : r.daysLeft === 1 ? 'غداً' : `${r.daysLeft}`;
    const daysLbl = r.daysLeft === 0 ? '' : r.daysLeft === 1 ? '' : 'يوم';

    const designBtn = r.directImgUrl
      ? `<button class="toggle-design-btn" onclick="toggleDesign(event, ${i})">
           <span class="dot"></span> عرض التصميم ▾
         </button>`
      : r.designLink
      ? `<a class="design-link-btn" href="${r.designLink}" target="_blank">🔗 فتح التصميم</a>`
      : `<button class="toggle-design-btn" style="opacity:0.4;pointer-events:none">
           <span class="dot no"></span> لا يوجد تصميم
         </button>`;

    const designImg = r.directImgUrl
      ? `<div class="design-section" id="design-${i}">
           <img class="design-img" src="${r.directImgUrl}" 
                onerror="this.parentElement.innerHTML='<div class=design-placeholder>⚠️ تعذّر عرض الصورة — <a href=\\'${r.designLink}\\' target=\\'_blank\\' style=\\'color:var(--accent)\\'>فتح الرابط</a></div>'"
                loading="lazy" alt="تصميم ${r.title}">
         </div>`
      : '';

    html += `
    <div class="card ${cardClass}">
      <div class="card-header">
        <div class="days-badge ${dayClass}">
          <span class="days-num">${daysText}</span>
          <span class="days-lbl">${daysLbl}</span>
        </div>
        <div class="card-info">
          <div class="card-title">${r.title || '—'}</div>
          <div class="card-meta">
            ${r.sheikh ? `<span class="meta-tag"><span class="icon">🎤</span>${r.sheikh}</span>` : ''}
            ${r.location ? `<span class="meta-tag"><span class="icon">📍</span>${r.location}</span>` : ''}
            ${r.time ? `<span class="meta-tag"><span class="icon">🕐</span>${r.time}</span>` : ''}
          </div>
        </div>
      </div>

      ${designImg}

      <div style="padding: 0 14px 6px; display:flex; align-items:center; justify-content:space-between;">
        ${designBtn}
        ${r.notes ? `<span style="font-size:11px;color:var(--text-muted)">📝 ${r.notes}</span>` : ''}
      </div>

      <div class="card-footer">
        <div class="date-display">
          📅 ${r.dateDisplay}
          ${r.dateHijri ? ` · ${r.dateHijri}` : ''}
          ${r.day ? ` · ${r.day}` : ''}
        </div>
        ${r.designer ? `<div class="designer-chip">🎨 ${r.designer}</div>` : ''}
      </div>
    </div>`;
  }

  document.getElementById('main-content').innerHTML =
    `<div class="cards-container">${html}</div>`;
}

function toggleDesign(e, idx) {
  e.stopPropagation();
  const section = document.getElementById(`design-${idx}`);
  if (!section) return;
  section.classList.toggle('open');
  const btn = e.currentTarget;
  if (section.classList.contains('open')) {
    btn.innerHTML = '<span class="dot"></span> إخفاء التصميم ▴';
  } else {
    btn.innerHTML = '<span class="dot"></span> عرض التصميم ▾';
  }
}

// Load on start
loadData();

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
