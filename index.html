<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="جدول الإعلام">
<title>الكلمات القادمة</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
:root {
  --bg:#0f0f1a; --surface:#1a1a2e; --card:#16213e;
  --accent:#e2a84b; --accent-soft:rgba(226,168,75,0.12);
  --green:#4caf7d; --green-soft:rgba(76,175,125,0.12);
  --red:#e05c5c; --red-soft:rgba(224,92,92,0.12);
  --orange:#f0883e; --orange-soft:rgba(240,136,62,0.12);
  --text:#eef0f5; --text-muted:#8892a4;
  --border:rgba(255,255,255,0.06); --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid var(--border);padding:20px 16px 14px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),#c8872a);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text h1{font-size:15px;font-weight:700;}
.logo-text p{font-size:11px;color:var(--text-muted);}
.refresh-btn{width:36px;height:36px;background:var(--accent-soft);border:1px solid rgba(226,168,75,0.2);border-radius:10px;color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s;}
.refresh-btn.spinning{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.stats-bar{display:flex;gap:8px;}
.stat-chip{flex:1;background:var(--accent-soft);border:1px solid rgba(226,168,75,0.15);border-radius:10px;padding:8px 6px;text-align:center;}
.stat-chip .num{font-size:18px;font-weight:800;color:var(--accent);line-height:1;}
.stat-chip .lbl{font-size:10px;color:var(--text-muted);margin-top:2px;}
.stat-chip.red{background:var(--red-soft);border-color:rgba(224,92,92,0.15);}
.stat-chip.red .num{color:var(--red);}
.stat-chip.green{background:var(--green-soft);border-color:rgba(76,175,125,0.15);}
.stat-chip.green .num{color:var(--green);}

.controls{padding:10px 16px;display:flex;gap:8px;}
.search-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.search-box:focus{border-color:rgba(226,168,75,0.4);}
.search-box::placeholder{color:var(--text-muted);}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;color:var(--text-muted);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;}
.filter-btn.active{background:var(--accent-soft);border-color:rgba(226,168,75,0.3);color:var(--accent);}

.cards-container{padding:4px 16px 100px;display:flex;flex-direction:column;gap:12px;}
.section-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;padding:14px 0 4px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.card.urgent{border-color:rgba(224,92,92,0.3);}
.card.soon{border-color:rgba(240,136,62,0.25);}
.card.week{border-color:rgba(226,168,75,0.2);}

.card-header{padding:14px 14px 10px;display:flex;align-items:flex-start;gap:10px;}
.days-badge{min-width:54px;height:54px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.b-today{background:var(--red-soft);} .b-today .dn,.b-today .dl{color:var(--red);}
.b-urgent{background:var(--red-soft);} .b-urgent .dn,.b-urgent .dl{color:var(--red);}
.b-soon{background:var(--orange-soft);} .b-soon .dn,.b-soon .dl{color:var(--orange);}
.b-week{background:var(--accent-soft);} .b-week .dn,.b-week .dl{color:var(--accent);}
.b-far{background:var(--green-soft);} .b-far .dn,.b-far .dl{color:var(--green);}
.dn{font-size:20px;font-weight:800;line-height:1;}
.dl{font-size:9px;opacity:.85;}

.card-info{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:700;line-height:1.4;margin-bottom:6px;}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;}
.meta-tag{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text-muted);background:rgba(255,255,255,0.04);padding:3px 7px;border-radius:6px;}

.card-footer{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.date-display{font-size:11px;color:var(--text-muted);}
.designer-chip{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-soft);color:var(--accent);}

.design-wrap{padding:0 14px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.toggle-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-muted);font-family:'Tajawal',sans-serif;font-size:11px;cursor:pointer;padding:5px 10px;display:flex;align-items:center;gap:5px;}
.toggle-btn.has{border-color:rgba(76,175,125,0.3);color:var(--green);}
.design-section{overflow:hidden;max-height:0;transition:max-height .35s ease;}
.design-section.open{max-height:500px;}
.design-img{width:100%;display:block;max-height:320px;object-fit:contain;background:#0a0a15;border-top:1px solid var(--border);}
.notes-chip{font-size:10px;color:var(--text-muted);font-style:italic;}
.open-link{font-size:11px;color:var(--accent);text-decoration:none;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
.loading p{color:var(--text-muted);font-size:14px;}
.loading small{color:var(--text-muted);font-size:11px;opacity:.6;}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty .emoji{font-size:48px;margin-bottom:12px;}
.error-box{margin:20px 16px;background:var(--red-soft);border:1px solid rgba(224,92,92,0.2);border-radius:var(--radius);padding:16px;font-size:13px;color:var(--red);line-height:1.7;}
.fab{position:fixed;bottom:24px;left:16px;width:44px;height:44px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 4px 20px rgba(226,168,75,.4);color:#1a1a2e;font-weight:bold;border:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🎙️</div>
      <div class="logo-text">
        <h1>الكلمات القادمة</h1>
        <p id="last-update">جمعية الراكة الدعوية</p>
      </div>
    </div>
    <button class="refresh-btn" id="rbtn" onclick="loadData()">↻</button>
  </div>
  <div class="stats-bar">
    <div class="stat-chip" id="s-total"><div class="num">—</div><div class="lbl">كلمة قادمة</div></div>
    <div class="stat-chip red" id="s-urgent"><div class="num">—</div><div class="lbl">خلال 3 أيام</div></div>
    <div class="stat-chip green" id="s-design"><div class="num">—</div><div class="lbl">جاهز التصميم</div></div>
  </div>
</div>

<div class="controls">
  <input class="search-box" type="text" placeholder="🔍  بحث..." id="q" oninput="render()">
  <button class="filter-btn" id="fb" onclick="toggleFilter()">بدون تصميم</button>
</div>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <p>جارٍ تحميل البيانات...</p>
    <small>قد يستغرق تحويل التواريخ الهجرية بضع ثوانٍ</small>
  </div>
</div>
<button class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const SID = '1dmh2EZ0BoFR-352eK4tqEezqzyRKIi_9bOMDmZogk6w';
let rows = [], noDesignOnly = false;
const dateCache = {};

// تحويل تاريخ هجري لميلادي عبر aladhan API
async function hijriToGregorian(d, m, y) {
  const key = `${d}-${m}-${y}`;
  if (dateCache[key] !== undefined) return dateCache[key];
  try {
    const r = await fetch(`https://api.aladhan.com/v1/hToG/${d}-${m}-${y}`);
    if (!r.ok) { dateCache[key]=null; return null; }
    const j = await r.json();
    const [dd,mm,yy] = j.data.gregorian.date.split('-');
    const result = new Date(parseInt(yy), parseInt(mm)-1, parseInt(dd));
    result.setHours(0,0,0,0);
    dateCache[key] = result;
    return result;
  } catch(e) { dateCache[key]=null; return null; }
}

// جلب السنة الهجرية الحالية
async function getCurrentHijriYear() {
  try {
    const t = new Date();
    const dd = String(t.getDate()).padStart(2,'0');
    const mm = String(t.getMonth()+1).padStart(2,'0');
    const yyyy = t.getFullYear();
    const r = await fetch(`https://api.aladhan.com/v1/gToH/${dd}-${mm}-${yyyy}`);
    if (!r.ok) throw new Error();
    const j = await r.json();
    return parseInt(j.data.hijri.year);
  } catch(e) {
    // تقدير محلي
    return Math.round((new Date().getFullYear() - 622) * (33/32));
  }
}

// تحليل نص التاريخ الهجري مثل "15/11" أو "15/11/1447" أو "5/12/1447"
function parseHijri(str, currentYear) {
  if (!str) return null;
  const s = String(str).replace(/[\\\/\-\.]/g, '/').trim();
  const p = s.split('/').map(Number);
  if (p.length === 2 && p[0] && p[1]) return { d:p[0], m:p[1], y:currentYear };
  if (p.length === 3 && p[0] && p[1] && p[2]) return { d:p[0], m:p[1], y:p[2] };
  return null;
}

async function loadData() {
  const rbtn = document.getElementById('rbtn');
  rbtn.classList.add('spinning');
  document.getElementById('content').innerHTML =
    '<div class="loading"><div class="spinner"></div><p>جارٍ تحميل البيانات...</p><small>قد يستغرق بضع ثوانٍ لتحويل التواريخ الهجرية</small></div>';

  try {
    // 1) جلب البيانات من الشيت
    const url = `https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json`;
    const res = await fetch(url);
    const txt = await res.text();
    const json = JSON.parse(txt.match(/setResponse\(([\s\S]*)\)/)[1]);

    // 2) جلب السنة الهجرية الحالية
    const hijriYear = await getCurrentHijriYear();

    const today = new Date(); today.setHours(0,0,0,0);

    // 3) تجميع الصفوف مع تحويل التواريخ بالتوازي
    const raw = [];
    for (const r of json.table.rows) {
      const c = r.c;
      if (!c) continue;
      const g = (i) => (c[i] && c[i].v != null) ? String(c[i].v).trim() : '';
      const hijriStr = g(7); // عمود H = index 7
      if (!hijriStr) continue;
      const parsed = parseHijri(hijriStr, hijriYear);
      if (!parsed) continue;
      const designLink = g(14); // عمود O
      const archiveVal = g(13); // عمود N
      const hasDesign = designLink.length > 0 || archiveVal.includes('تمت') || archiveVal.includes('✅');
      let imgUrl = null;
      if (designLink.includes('drive.google.com')) {
        const id = (designLink.match(/\/d\/([a-zA-Z0-9_-]+)/) || [])[1];
        if (id) imgUrl = `https://drive.google.com/thumbnail?id=${id}&sz=w600`;
      }
      raw.push({
        parsed, hijriStr,
        title: g(3), type: g(1), sheikh: g(4),
        day: g(5), dateGreg: g(6), time: g(8),
        location: g(9), designer: g(11), notes: g(12),
        designLink, hasDesign, imgUrl
      });
    }

    // 4) تحويل كل التواريخ بالتوازي
    const dates = await Promise.all(
      raw.map(r => hijriToGregorian(r.parsed.d, r.parsed.m, r.parsed.y))
    );

    // 5) فلترة المستقبلي فقط
    rows = [];
    raw.forEach((r, i) => {
      const gDate = dates[i];
      if (!gDate) return;
      const diff = Math.round((gDate - today) / 86400000);
      if (diff < 0) return;
      rows.push({ ...r, gDate, diff });
    });

    rows.sort((a,b) => a.diff - b.diff);
    updateStats();
    render();

    const n = new Date();
    document.getElementById('last-update').textContent =
      `آخر تحديث: ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;

  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-box">⚠️ تعذّر تحميل البيانات<br><br>تأكد من الاتصال بالإنترنت ثم اضغط ↻<br><small style="opacity:.7">${e.message}</small></div>`;
  } finally {
    rbtn.classList.remove('spinning');
  }
}

function updateStats() {
  document.querySelector('#s-total .num').textContent = rows.length;
  document.querySelector('#s-urgent .num').textContent = rows.filter(r=>r.diff<=3).length;
  document.querySelector('#s-design .num').textContent = rows.filter(r=>r.hasDesign).length;
}

function toggleFilter() {
  noDesignOnly = !noDesignOnly;
  const b = document.getElementById('fb');
  b.classList.toggle('active', noDesignOnly);
  b.textContent = noDesignOnly ? '✓ بدون تصميم' : 'بدون تصميم';
  render();
}

function badgeClass(d){ return d===0?'b-today':d<=2?'b-urgent':d<=5?'b-soon':d<=14?'b-week':'b-far'; }
function cardClass(d){ return d<=2?'urgent':d<=5?'soon':d<=14?'week':''; }
function sectionFor(d){ return d===0?'🔴 اليوم':d<=3?'🟠 خلال 3 أيام':d<=7?'🟡 هذا الأسبوع':d<=14?'🟢 خلال أسبوعين':'📅 لاحقاً'; }

function render() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const filtered = rows.filter(r => {
    const ms = !q || [r.title,r.sheikh,r.location,r.type].some(x=>x.toLowerCase().includes(q));
    return ms && (!noDesignOnly || !r.hasDesign);
  });

  if (!filtered.length) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><div class="emoji">🔍</div><p>لا توجد نتائج</p></div>';
    return;
  }

  let html = '<div class="cards-container">';
  let lastSec = null;

  filtered.forEach((r, i) => {
    const sec = sectionFor(r.diff);
    if (sec !== lastSec) { html += `<div class="section-label">${sec}</div>`; lastSec = sec; }

    const bc = badgeClass(r.diff);
    const cc = cardClass(r.diff);
    const dayTxt = r.diff===0?'اليوم':r.diff===1?'غداً':String(r.diff);
    const dayLbl = r.diff<=1?'':' يوم';

    // زر التصميم
    const designBtn = r.imgUrl
      ? `<button class="toggle-btn has" onclick="toggleImg(event,${i})">🖼️ عرض التصميم ▾</button>`
      : r.designLink
      ? `<a class="toggle-btn has" style="text-decoration:none" href="${r.designLink}" target="_blank">🔗 فتح التصميم</a>`
      : `<span class="toggle-btn" style="opacity:.4;pointer-events:none">لا يوجد تصميم</span>`;

    // قسم الصورة
    const imgSec = r.imgUrl
      ? `<div class="design-section" id="ds${i}">
           <img class="design-img" src="${r.imgUrl}"
             onerror="this.outerHTML='<div style=\\'padding:14px;text-align:center;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border)\\'>⚠️ تعذّر عرض الصورة — <a class=open-link href=\\'${r.designLink}\\' target=\\'_blank\\'>فتح الرابط</a></div>'"
             loading="lazy">
         </div>` : '';

    // التاريخ الميلادي المحوّل
    const gregFormatted = r.gDate
      ? `${r.gDate.getDate()}/${r.gDate.getMonth()+1}/${r.gDate.getFullYear()}`
      : r.dateGreg;

    html += `
    <div class="card ${cc}">
      <div class="card-header">
        <div class="days-badge ${bc}">
          <span class="dn">${dayTxt}</span>
          <span class="dl">${dayLbl}</span>
        </div>
        <div class="card-info">
          <div class="card-title">${r.title||'—'}</div>
          <div class="card-meta">
            ${r.sheikh?`<span class="meta-tag">🎤 ${r.sheikh}</span>`:''}
            ${r.location?`<span class="meta-tag">📍 ${r.location}</span>`:''}
            ${r.time?`<span class="meta-tag">🕐 ${r.time}</span>`:''}
            ${r.type?`<span class="meta-tag">${r.type}</span>`:''}
          </div>
        </div>
      </div>
      ${imgSec}
      <div class="design-wrap">
        ${designBtn}
        ${r.notes?`<span class="notes-chip">📝 ${r.notes}</span>`:''}
      </div>
      <div class="card-footer">
        <div class="date-display">🗓️ ${r.hijriStr} هـ &nbsp;·&nbsp; 📅 ${gregFormatted}${r.day?' · '+r.day:''}</div>
        ${r.designer?`<div class="designer-chip">🎨 ${r.designer}</div>`:''}
      </div>
    </div>`;
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function toggleImg(e, i) {
  const sec = document.getElementById('ds'+i);
  if (!sec) return;
  sec.classList.toggle('open');
  e.currentTarget.textContent = sec.classList.contains('open')
    ? '🖼️ إخفاء التصميم ▴' : '🖼️ عرض التصميم ▾';
}

loadData();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
